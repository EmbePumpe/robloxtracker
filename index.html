<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>RobloxWatch — Kontrola rodzicielska</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c27;--border:rgba(255,255,255,0.07);--accent:#00e5a0;--accent2:#7c6fff;--warn:#ff6b6b;--text:#f0f0f8;--muted:#6b6b88;--radius:16px;--mono:'DM Mono',monospace;--display:'Syne',sans-serif}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:var(--display);min-height:100dvh;max-width:500px;margin:0 auto;padding:0 0 40px}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:20px 20px 0}
.logo{font-size:18px;font-weight:800;letter-spacing:-0.5px}.logo span{color:var(--accent)}
.live{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite;display:none}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(0,229,160,.4)}70%{box-shadow:0 0 0 8px rgba(0,229,160,0)}100%{box-shadow:0 0 0 0 rgba(0,229,160,0)}}
.search{padding:20px 20px 0}
.slabel{font-size:11px;font-weight:600;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
.srow{display:flex;gap:8px}
.sinput{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;font-family:var(--mono);font-size:14px;color:var(--text);outline:none;transition:border-color .2s}
.sinput:focus{border-color:var(--accent)}.sinput::placeholder{color:var(--muted)}
.sbtn{background:var(--accent);border:none;border-radius:12px;width:52px;height:52px;cursor:pointer;font-size:20px;transition:transform .15s,opacity .15s;flex-shrink:0}
.sbtn:active{transform:scale(.93);opacity:.85}.sbtn:disabled{opacity:.4;cursor:not-allowed}
.chips{padding:10px 20px 0;display:flex;gap:6px;flex-wrap:wrap}
.chip{background:var(--surface);border:1px solid var(--border);border-radius:50px;padding:5px 12px;font-size:12px;font-family:var(--mono);color:var(--muted);cursor:pointer;transition:all .15s}
.chip:hover{border-color:var(--accent);color:var(--accent)}
.msg{padding:10px 20px;font-size:13px;font-family:var(--mono);color:var(--muted);display:none}
.err{margin:10px 20px;background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.25);border-radius:12px;padding:14px 16px;font-size:13px;color:var(--warn);font-family:var(--mono);line-height:1.5;display:none}
.prof{display:none;padding:0 20px}
.pcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:12px;position:relative;overflow:hidden}
.pcard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.ptop{display:flex;gap:14px;align-items:center;margin-bottom:16px}
.avi{width:68px;height:68px;border-radius:12px;background:var(--surface2);object-fit:cover;flex-shrink:0}
.avi-init{width:68px;height:68px;border-radius:12px;background:rgba(0,229,160,.12);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;flex-shrink:0}
.pname{font-size:20px;font-weight:800;letter-spacing:-.5px}
.psub{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:2px}
.pbadge{display:inline-flex;align-items:center;gap:5px;margin-top:8px;padding:4px 12px;border-radius:50px;font-size:12px;font-weight:600;font-family:var(--mono)}
.pbadge.on{background:rgba(0,229,160,.12);color:var(--accent)}
.pbadge.off{background:rgba(255,255,255,.05);color:var(--muted)}
.pbadge .dot{width:5px;height:5px;border-radius:50%;background:currentColor}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.stat{background:var(--surface2);border-radius:10px;padding:12px 8px;text-align:center}
.sv{font-size:18px;font-weight:700;font-family:var(--mono)}.sl{font-size:10px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
.now{background:rgba(0,229,160,.07);border:1px solid rgba(0,229,160,.2);border-radius:var(--radius);padding:14px 18px;margin-bottom:12px;display:none}
.now-lbl{font-size:10px;font-weight:600;letter-spacing:2px;color:var(--accent);text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.now-lbl::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 1.5s infinite}
.now-game{font-size:17px;font-weight:700}.now-meta{font-size:12px;color:var(--muted);margin-top:3px;font-family:var(--mono)}
.ai{background:var(--surface);border:1px solid rgba(124,111,255,.2);border-radius:var(--radius);padding:16px 18px;margin-bottom:12px;display:none}
.ai-lbl{font-size:10px;font-weight:600;letter-spacing:2px;color:var(--accent2);text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.ai-txt{font-size:14px;line-height:1.65;color:rgba(240,240,248,.8)}
.dots{display:flex;gap:4px}.d{width:6px;height:6px;border-radius:50%;background:var(--accent2);animation:db 1.2s infinite}
.d:nth-child(2){animation-delay:.2s}.d:nth-child(3){animation-delay:.4s}
@keyframes db{0%,80%,100%{opacity:.3;transform:scale(.7)}40%{opacity:1;transform:scale(1)}}
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:8px}
.tab{flex:1;padding:10px 0;font-size:12px;font-weight:600;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:var(--display);transition:all .15s;letter-spacing:.3px}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.panel{display:none}.panel.active{display:block}
.frow{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--border)}
.frow:last-child{border-bottom:none}
.finit{width:34px;height:34px;border-radius:8px;background:rgba(0,229,160,.1);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.fn{flex:1;font-size:14px;font-weight:600}
.fo{font-size:11px;color:var(--accent);font-family:var(--mono)}
.fof{font-size:11px;color:var(--muted);font-family:var(--mono)}
.hrow{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.hrow:last-child{border-bottom:none}
.hico{width:38px;height:38px;border-radius:10px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.hn{font-size:14px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hm{font-size:11px;color:var(--muted);margin-top:2px;font-family:var(--mono)}
.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px}
.note{background:var(--surface2);border-radius:10px;padding:12px 14px;font-size:12px;color:var(--muted);margin-top:10px;line-height:1.6}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo">Roblox<span>Watch</span></div>
  <div style="display:flex;gap:10px;align-items:center">
    <span id="refreshTime" style="font-size:11px;font-family:var(--mono);color:var(--muted)"></span>
    <div class="live" id="liveDot"></div>
  </div>
</div>

<div class="search">
  <div class="slabel">Nazwa gracza w Roblox</div>
  <div class="srow">
    <input class="sinput" id="uIn" placeholder="np. CoolKid123" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" onkeydown="if(event.key==='Enter')go()">
    <button class="sbtn" id="goBtn" onclick="go()">&#8594;</button>
  </div>
</div>

<div class="chips" id="chipsEl"></div>
<div class="msg" id="msgEl"></div>
<div class="err" id="errEl"></div>

<div class="prof" id="profEl">
  <div class="pcard">
    <div class="ptop">
      <div id="aviWrap"></div>
      <div>
        <div class="pname" id="pName"></div>
        <div class="psub" id="pSub"></div>
        <div class="pbadge off" id="pBadge"><span class="dot"></span><span id="pBadgeTxt">Offline</span></div>
      </div>
    </div>
    <div class="stats">
      <div class="stat"><div class="sv" id="sFri">&#8212;</div><div class="sl">Znajomi</div></div>
      <div class="stat"><div class="sv" id="sFol">&#8212;</div><div class="sl">Obs.</div></div>
      <div class="stat"><div class="sv" id="sYr">&#8212;</div><div class="sl">Konto od</div></div>
    </div>
  </div>

  <div class="now" id="nowEl">
    <div class="now-lbl">Teraz gra</div>
    <div class="now-game" id="nowGame"></div>
    <div class="now-meta" id="nowMeta"></div>
  </div>

  <div class="ai" id="aiEl">
    <div class="ai-lbl">&#9670; Analiza AI &#8212; raport rodzicielski</div>
    <div id="aiContent"><div class="dots"><div class="d"></div><div class="d"></div><div class="d"></div></div></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="sw('h',this)">Status / historia</button>
    <button class="tab" onclick="sw('f',this)">Znajomi</button>
  </div>
  <div class="panel active" id="hPanel"></div>
  <div class="panel" id="fPanel"></div>
</div>

<script>
// ─── PROXY SYSTEM ─────────────────────────────────────────────────────────────
// WORKER_URL = Twój Cloudflare Worker (instrukcja w pliku worker.js)
// Ustaw po deployu, np: 'https://roblox-proxy.TWOJANAZWA.workers.dev'
var WORKER_URL = 'https://my-worker.k4rol1234.workers.dev';

function proxyGet(url) {
  if (WORKER_URL) return WORKER_URL + '?url=' + encodeURIComponent(url);
  // Fallback bez workera - tylko te proxy które działają z GitHub Pages
  return 'https://corsproxy.io/?url=' + encodeURIComponent(url);
}

function proxyPost(url) {
  if (WORKER_URL) return WORKER_URL + '?url=' + encodeURIComponent(url);
  return 'https://corsproxy.io/?url=' + encodeURIComponent(url);
}

async function rFetch(url) {
  var proxies = WORKER_URL
    ? [WORKER_URL + '?url=' + encodeURIComponent(url)]
    : [
        'https://corsproxy.io/?url=' + encodeURIComponent(url),
        'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(url),
      ];

  var lastErr;
  for (var i = 0; i < proxies.length; i++) {
    try {
      var r = await fetch(proxies[i], { signal: AbortSignal.timeout(9000) });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      var txt = await r.text();
      if (!txt || txt[0] === '<' || txt.indexOf('not in allowlist') > -1 || txt.indexOf('ERR_') > -1)
        throw new Error('Proxy blad: ' + txt.substring(0,80));
      return JSON.parse(txt);
    } catch(e) { lastErr = e; console.warn('rFetch fail [' + i + ']:', e.message); }
  }
  throw new Error('Blad polaczenia: ' + (lastErr ? lastErr.message : 'nieznany'));
}

async function rPost(url, body) {
  var proxies = WORKER_URL
    ? [WORKER_URL + '?url=' + encodeURIComponent(url)]
    : ['https://corsproxy.io/?url=' + encodeURIComponent(url)];

  var lastErr;
  for (var i = 0; i < proxies.length; i++) {
    try {
      var r = await fetch(proxies[i], {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
        signal: AbortSignal.timeout(9000)
      });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      var txt = await r.text();
      if (!txt || txt[0] === '<' || txt.indexOf('not in allowlist') > -1)
        throw new Error('Proxy blad');
      return JSON.parse(txt);
    } catch(e) { lastErr = e; console.warn('rPost fail [' + i + ']:', e.message); }
  }
  throw new Error('POST blad: ' + (lastErr ? lastErr.message : 'nieznany'));
}

// ─── STATE ────────────────────────────────────────────────────────────────────
var S = { uid: null, uname: null };
var saved = [];
try { saved = JSON.parse(localStorage.getItem('rw3') || '[]'); } catch(e){}

function q(id) { return document.getElementById(id); }
function showMsg(t) { q('msgEl').textContent = t; q('msgEl').style.display = 'block'; q('errEl').style.display = 'none'; }
function showErr(t) { q('errEl').innerHTML = t; q('errEl').style.display = 'block'; q('msgEl').style.display = 'none'; }
function hideMsg() { q('msgEl').style.display = 'none'; }

function fmtN(n) {
  if (n == null || n === '?') return '?';
  if (n >= 1e6) return (Math.round(n/1e5)/10) + 'M';
  if (n >= 1000) return (Math.round(n/100)/10) + 'K';
  return '' + n;
}
function timeAgo(iso) {
  if (!iso) return '';
  var s = (Date.now() - new Date(iso)) / 1000;
  if (s < 60) return 'przed chwila';
  if (s < 3600) return Math.floor(s/60) + ' min temu';
  if (s < 86400) return Math.floor(s/3600) + ' h temu';
  return Math.floor(s/86400) + ' dni temu';
}
function fmtDT(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleString('pl-PL',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
}

// ─── SEARCH ───────────────────────────────────────────────────────────────────
async function go() {
  var name = q('uIn').value.trim();
  if (!name) return;
  q('goBtn').disabled = true;
  showMsg('Szukam gracza "' + name + '"...');
  q('profEl').style.display = 'none';
  q('liveDot').style.display = 'none';

  try {
    var uid = null;

    // Próba 1: POST username lookup
    try {
      var data = await rPost('https://users.roblox.com/v1/usernames/users', { usernames: [name], excludeBannedUsers: false });
      if (data.data && data.data.length) { uid = data.data[0].id; S.uname = data.data[0].name; }
    } catch(e1) {
      // Próba 2: GET search
      try {
        var data2 = await rFetch('https://users.roblox.com/v1/users/search?keyword=' + encodeURIComponent(name) + '&limit=10');
        if (data2.data && data2.data.length) {
          var match = data2.data.find(function(u){ return u.name.toLowerCase() === name.toLowerCase(); }) || data2.data[0];
          uid = match.id; S.uname = match.name;
        }
      } catch(e2) {}
    }

    if (!uid) {
      showErr('Nie znaleziono gracza <b>"' + name + '"</b>.<br>Sprawdz pisownie. Jesli blad sie powtarza, Roblox API moze byc chwilowo niedostepne — sprobuj za minute.');
      return;
    }

    S.uid = uid;
    await loadProfile();
  } catch(e) {
    showErr('Blad polaczenia: ' + e.message);
  } finally {
    q('goBtn').disabled = false;
  }
}

// ─── PROFILE ─────────────────────────────────────────────────────────────────
async function loadProfile() {
  showMsg('Pobieranie profilu...');

  var results = await Promise.allSettled([
    rFetch('https://users.roblox.com/v1/users/' + S.uid),
    rPost('https://presence.roblox.com/v1/presence/users', { userIds: [S.uid] }),  // presence wymaga POST!
    rFetch('https://friends.roblox.com/v1/users/' + S.uid + '/friends?userSort=StatusAlphabetical'),
    rFetch('https://friends.roblox.com/v1/users/' + S.uid + '/followers/count'),
  ]);

  var user    = results[0].status === 'fulfilled' ? results[0].value : {};
  var presRaw = results[1].status === 'fulfilled' ? results[1].value : null;
  var friends = results[2].status === 'fulfilled' ? (results[2].value.data||[]) : [];
  var folCnt  = results[3].status === 'fulfilled' ? results[3].value.count : null;

  console.log("PRESENCE RAW:", JSON.stringify(presRaw));
  console.log("PRESENCE STATUS:", results[1].status, results[1].reason ? String(results[1].reason) : "ok");

  var pres = {};
  if (presRaw) {
    if (presRaw.userPresences && presRaw.userPresences.length) { pres = presRaw.userPresences[0]; }
    else if (Array.isArray(presRaw) && presRaw.length) { pres = presRaw[0]; }
    else if (presRaw.userPresenceType !== undefined) { pres = presRaw; }
  }
  console.log("PRES PARSED:", JSON.stringify(pres));

  hideMsg();

  // Avatar — inicjaly fallback, potem laduje obrazek
  var aw = q('aviWrap');
  var init = ((user.displayName||user.name||'?').substring(0,2)).toUpperCase();
  aw.innerHTML = '<div class="avi-init">' + init + '</div>';
  rFetch('https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds=' + S.uid + '&size=150x150&format=Png&isCircular=false')
    .then(function(r) { if (r.data && r.data[0] && r.data[0].imageUrl) aw.innerHTML = '<img class="avi" src="' + r.data[0].imageUrl + '">'; })
    .catch(function(){});

  q('pName').textContent = user.displayName || user.name || S.uname || '?';
  q('pSub').textContent  = '@' + (user.name || S.uname || '?');
  q('sFri').textContent  = fmtN(friends.length);
  q('sFol').textContent  = fmtN(folCnt);
  q('sYr').textContent   = user.created ? new Date(user.created).getFullYear() : '?';

  var pt = pres.userPresenceType || 0;
  var inGame = pt === 2, online = pt > 0;
  var badge = q('pBadge');
  badge.className = 'pbadge ' + (online ? 'on' : 'off');
  q('pBadgeTxt').textContent = inGame ? 'Teraz gra' : online ? 'Online' : 'Offline';
  q('liveDot').style.display = online ? 'block' : 'none';

  var nowEl = q('nowEl');
  if (inGame && pres.lastLocation) {
    nowEl.style.display = 'block';
    q('nowGame').textContent = pres.lastLocation;
    q('nowMeta').textContent = pres.lastOnline ? 'Gra od ' + timeAgo(pres.lastOnline) : 'Aktywna sesja';
  } else {
    nowEl.style.display = 'none';
  }

  renderHistory(pres);
  renderFriends(friends);

  q('refreshTime').textContent = new Date().toLocaleTimeString('pl-PL',{hour:'2-digit',minute:'2-digit'});
  q('profEl').style.display = 'block';

  // Zapisz w historii
  if (!saved.find(function(s){ return s.id === S.uid; })) {
    saved.unshift({ id: S.uid, name: S.uname || user.name });
    if (saved.length > 8) saved = saved.slice(0, 8);
    try { localStorage.setItem('rw3', JSON.stringify(saved)); } catch(e){}
  }
  renderChips();
  runAI(user, pres, friends);
}

function renderHistory(pres) {
  var el = q('hPanel');
  var pt = pres.userPresenceType || 0;
  var items = [];
  if (pt === 2 && pres.lastLocation)
    items.push({ ico: '&#x1F7E2;', name: pres.lastLocation, meta: 'Teraz &bull; aktywna sesja' });
  if (pres.lastOnline && pt !== 2)
    items.push({ ico: '&#127918;', name: pres.lastLocation || 'Roblox', meta: 'Ostatnio: ' + timeAgo(pres.lastOnline) + ' &middot; ' + fmtDT(pres.lastOnline) });
  if (!items.length)
    items.push({ ico: '&#128164;', name: 'Brak aktywnosci', meta: 'Gracz jest offline' });

  el.innerHTML = items.map(function(i){
    return '<div class="hrow"><div class="hico">' + i.ico + '</div><div><div class="hn">' + i.name + '</div><div class="hm">' + i.meta + '</div></div></div>';
  }).join('') + '<div class="note">&#8505; Roblox nie udostepnia pelnej historii gier przez publiczne API. Widoczna jest tylko biez&aacute;ca lub ostatnia sesja. Peln&aacute; historia jest dostepna w oficjalnym panelu <b>Roblox Family</b>.</div>';
}

function renderFriends(friends) {
  var el = q('fPanel');
  if (!friends.length) {
    el.innerHTML = '<div class="empty">Brak znajomych lub profil jest prywatny.</div>';
    return;
  }
  var s = friends.slice().sort(function(a,b){ return (b.isOnline?1:0)-(a.isOnline?1:0); });
  el.innerHTML = s.slice(0,30).map(function(f){
    var init = ((f.displayName||f.name||'?').substring(0,2)).toUpperCase();
    return '<div class="frow"><div class="finit">' + init + '</div><div class="fn">' + (f.displayName||f.name) + '<br><span style="font-size:11px;color:var(--muted);font-family:var(--mono)">@' + f.name + '</span></div><div class="' + (f.isOnline?'fo':'fof') + '">' + (f.isOnline?'&#9679; online':'offline') + '</div></div>';
  }).join('');
  if (friends.length > 30) el.innerHTML += '<div class="empty">...i ' + (friends.length-30) + ' wiecej</div>';
}

function runAI(user, pres, friends) {
  q('aiEl').style.display = 'block';
  var pt = pres.userPresenceType || 0;
  var inGame = pt === 2, online = pt > 0;
  var onlineFriends = friends.filter(function(f){ return f.isOnline; }).length;
  var accountAge = user.created ? Math.floor((Date.now() - new Date(user.created)) / (86400*365*1000)) : null;
  var lines = [];

  // Status teraz
  if (inGame && pres.lastLocation) {
    lines.push('Gracz jest teraz aktywny i gra w <b>' + pres.lastLocation + '</b>.');
  } else if (online) {
    lines.push('Gracz jest teraz zalogowany w Roblox, ale nie jest w żadnej grze.');
  } else {
    var lastSeen = pres.lastOnline ? ' (ostatnio widziany: ' + timeAgo(pres.lastOnline) + ')' : '';
    lines.push('Gracz jest obecnie offline' + lastSeen + '.');
  }

  // Konto
  if (accountAge !== null) {
    if (accountAge < 1) lines.push('Konto jest bardzo nowe — założone w tym roku. Warto sprawdzić czy dziecko nie zakłada nowych kont.');
    else if (accountAge < 2) lines.push('Konto ma około roku — relatywnie nowe.');
    else lines.push('Konto istnieje od ' + new Date(user.created).getFullYear() + ' (' + accountAge + ' ' + (accountAge===1?'rok':accountAge<5?'lata':'lat') + ') — jest już ugruntowane.');
  }

  // Znajomi
  if (friends.length === 0) {
    lines.push('Gracz nie ma znajomych na liście lub profil jest ustawiony jako prywatny — brak ryzyka związanego z kontaktami.');
  } else if (friends.length <= 10) {
    lines.push('Lista znajomych jest mała (' + friends.length + ' osób' + (onlineFriends > 0 ? ', z czego ' + onlineFriends + ' jest teraz online' : '') + ') — to dobry znak.');
  } else if (friends.length <= 50) {
    lines.push('Gracz ma ' + friends.length + ' znajomych' + (onlineFriends > 0 ? ', w tym ' + onlineFriends + ' online teraz' : '') + ' — typowa liczba dla aktywnego gracza.');
  } else {
    lines.push('Gracz ma dużą liczbę znajomych (' + friends.length + '). Warto sprawdzić czy dziecko zna te osoby w realnym życiu.');
  }

  // Rekomendacja
  lines.push('Pamiętaj, że Roblox Family pozwala ustawić limity czasu gry i blokadę czatu — warto to skonfigurować jeśli jeszcze tego nie zrobiłeś.');

  q('aiContent').innerHTML = '<div class="ai-txt">' + lines.join(' ') + '</div>';
}

function sw(p, el) {
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.querySelectorAll('.panel').forEach(function(x){ x.classList.remove('active'); });
  el.classList.add('active');
  q(p + 'Panel').classList.add('active');
}

function renderChips() {
  q('chipsEl').innerHTML = saved.map(function(s){
    return '<div class="chip" onclick="loadSaved(' + s.id + ',\'' + s.name + '\')">@' + s.name + '</div>';
  }).join('');
}

function loadSaved(id, name) {
  S.uid = id; S.uname = name;
  q('uIn').value = name;
  q('profEl').style.display = 'none';
  loadProfile();
}

renderChips();
</script>
</body>
</html>
